# Machine-local Git identity and signing settings.
# Copy or adapt this into ~/.config/dotfiles/git/personal.local.ini.

[user]
  # name = Your Name
  # email = you@example.com
  # signingKey = YOUR_KEY_ID_OR_PUBLIC_KEY_PATH

# Example: enable signed commits and tags
[commit]
  # gpgsign = true

[tag]
  # gpgsign = true
  # forceSignAnnotated = true

# Example: SSH signing
[gpg]
  # format = ssh
